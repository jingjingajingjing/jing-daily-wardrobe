<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静静的衣橱</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f9f4f0; }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto 20px;
        }
        h1 { color: #5a5a5a; }
        .outfit { font-size: 1.2rem; color: #d4a373; font-weight: bold; min-height: 2em; }
        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #d4a373, #c4956a);
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(212,163,115,0.4);
        }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }
        .indicator { color: #999; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌸 今天想穿啥呀呀，静静</h1>
        <p>今天天气：18°C 多云</p>
        <p>今天心情怎么样呀!</p>
        <p>静静你穿啥都好看</p>
        <hr>
        <p>为你推荐的穿搭：</p>
        <p class="outfit" id="outfitDisplay">今天穿件漂亮的毛衣吧 + 浅色牛仔裤</p>
        <p class="indicator" id="indicator">1 / 3</p>
        <button class="btn" onclick="switchOutfit()">换一套看看</button>
    </div>

    <script>
        const outfits = [
            "今天穿件漂亮的毛衣吧 + 浅色牛仔裤",
            "简约白衬衫 + 高腰阔腿裤",
            "针织开衫 + 碎花半身裙"
        ];
        let currentIndex = 0;

        function switchOutfit() {
            currentIndex = (currentIndex + 1) % outfits.length;
            document.getElementById("outfitDisplay").textContent = outfits[currentIndex];
            document.getElementById("indicator").textContent = `${currentIndex + 1} / 3`;
        }
    </script>
</body>
</html>
